name: Release macOS

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  pages: write

jobs:
  build:
    name: Build ${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15
            arch: arm64
            rust_target: aarch64-apple-darwin
          - runner: macos-15-intel
            arch: x86_64
            rust_target: x86_64-apple-darwin

    steps:
      - uses: actions/checkout@v5

      - name: Derive release metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          channel="stable"
          if [[ "$version" == *"-beta."* ]]; then
            channel="beta"
          fi
          echo "version=$version" >>"$GITHUB_OUTPUT"
          echo "channel=$channel" >>"$GITHUB_OUTPUT"

      - name: Install macOS dependencies
        shell: bash
        run: |
          set -euo pipefail
          brew update
          brew install cmake

      - name: Install Zig 0.15.2
        shell: bash
        run: |
          set -euo pipefail
          ZIG_VERSION="0.15.2"
          case "${{ matrix.arch }}" in
            arm64)  ZIG_ARCH="aarch64" ;;
            x86_64) ZIG_ARCH="x86_64" ;;
          esac
          ZIG_DIR="zig-${ZIG_ARCH}-macos-${ZIG_VERSION}"
          ZIG_TARBALL="${ZIG_DIR}.tar.xz"
          curl -sSfL "https://ziglang.org/download/${ZIG_VERSION}/${ZIG_TARBALL}" -o "/tmp/${ZIG_TARBALL}"
          mkdir -p "$HOME/.local"
          tar -xf "/tmp/${ZIG_TARBALL}" -C "$HOME/.local"
          echo "$HOME/.local/${ZIG_DIR}" >> "$GITHUB_PATH"
          "$HOME/.local/${ZIG_DIR}/zig" version

      - name: Configure Rust toolchain
        shell: bash
        run: |
          set -euo pipefail
          rustup default stable
          rustup target add "${{ matrix.rust_target }}"

      - name: Download Sparkle framework
        shell: bash
        run: ./scripts/sparkle/download.sh

      - name: Import Developer ID certificate
        shell: bash
        env:
          APPLE_CERTIFICATE_P12_BASE64: ${{ secrets.APPLE_CERTIFICATE_P12_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_KEYCHAIN_PASSWORD: ${{ secrets.APPLE_KEYCHAIN_PASSWORD }}
        run: ./scripts/macos/import-certificate.sh

      - name: Build, sign, notarize, and package
        shell: bash
        env:
          CON_CHANNEL: ${{ steps.meta.outputs.channel }}
          CON_APP_VERSION: ${{ steps.meta.outputs.version }}
          CON_BUILD_NUMBER: ${{ github.run_number }}
          CON_ARCH: ${{ matrix.arch }}
          CON_RUST_TARGET: ${{ matrix.rust_target }}
          CON_REQUIRE_NOTARIZATION: "1"
          CON_SPARKLE_PUBLIC_ED_KEY: ${{ secrets.SPARKLE_PUBLIC_ED_KEY }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_NOTARY_KEY_ID: ${{ secrets.APPLE_NOTARY_KEY_ID }}
          APPLE_NOTARY_ISSUER_ID: ${{ secrets.APPLE_NOTARY_ISSUER_ID }}
          APPLE_NOTARY_API_KEY_BASE64: ${{ secrets.APPLE_NOTARY_API_KEY_BASE64 }}
        run: ./scripts/macos/release.sh

      - name: Upload notarized artifacts
        uses: actions/upload-artifact@v5
        with:
          name: macos-${{ matrix.arch }}
          path: dist/macos/${{ steps.meta.outputs.channel }}/${{ matrix.arch }}/*
          if-no-files-found: error

  publish:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v5

      - uses: actions/download-artifact@v5
        with:
          path: release-artifacts

      - name: Derive release metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          echo "version=$version" >>"$GITHUB_OUTPUT"

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          tag="$GITHUB_REF_NAME"

          if ! gh release view "$tag" >/dev/null 2>&1; then
            gh release create "$tag" --title "$tag" --generate-notes
          fi

          # Upload files one at a time to avoid GitHub API race conditions.
          # xargs can invoke multiple gh processes that compete for the same
          # upload endpoint, causing spurious 404s.
          while IFS= read -r -d '' file; do
            echo "Uploading: $file"
            gh release upload "$tag" "$file" --clobber
          done < <(find release-artifacts -type f \
            \( -name '*.zip' -o -name '*.dmg' -o -name 'SHA256SUMS.txt' \) \
            -print0)

  update-appcast:
    name: Update Sparkle appcast
    runs-on: macos-15
    needs: publish

    steps:
      - uses: actions/checkout@v5

      - name: Derive release metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          channel="stable"
          if [[ "$version" == *"-beta."* ]]; then
            channel="beta"
          fi
          marketing="${version%%[-+]*}"
          echo "version=$version" >>"$GITHUB_OUTPUT"
          echo "channel=$channel" >>"$GITHUB_OUTPUT"
          echo "marketing=$marketing" >>"$GITHUB_OUTPUT"

      - name: Check Sparkle signing key
        id: sparkle
        shell: bash
        env:
          SPARKLE_SIGNING_KEY: ${{ secrets.SPARKLE_SIGNING_KEY }}
        run: |
          if [[ -z "${SPARKLE_SIGNING_KEY:-}" ]]; then
            echo "available=false" >>"$GITHUB_OUTPUT"
            echo "::warning::SPARKLE_SIGNING_KEY not set — skipping appcast update"
          else
            echo "available=true" >>"$GITHUB_OUTPUT"
          fi

      - name: Download Sparkle tools
        if: steps.sparkle.outputs.available == 'true'
        shell: bash
        run: ./scripts/sparkle/download.sh

      - name: Download release artifacts
        if: steps.sparkle.outputs.available == 'true'
        uses: actions/download-artifact@v5
        with:
          path: release-artifacts

      - name: Checkout gh-pages
        if: steps.sparkle.outputs.available == 'true'
        shell: bash
        run: |
          set -euo pipefail
          # Clone existing gh-pages or create the branch inline.
          # Uses fetch+checkout to be resilient to concurrent runs.
          git clone --single-branch --branch gh-pages \
            "https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git" \
            gh-pages 2>/dev/null || {
            mkdir -p gh-pages/appcast
            cd gh-pages
            git init
            git checkout -b gh-pages
            git remote add origin \
              "https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git"
            echo "con-releases.nowledge.co" > CNAME
            touch .nojekyll
            git add CNAME .nojekyll
            git commit -m "Initialize gh-pages"
          }

      - name: Sign artifacts and update appcasts
        if: steps.sparkle.outputs.available == 'true'
        shell: bash
        env:
          SPARKLE_SIGNING_KEY: ${{ secrets.SPARKLE_SIGNING_KEY }}
          SPARKLE_DIR: ${{ github.workspace }}/.sparkle
        run: |
          set -euo pipefail

          repo="${{ github.repository }}"
          tag="$GITHUB_REF_NAME"
          version="${{ steps.meta.outputs.version }}"
          channel="${{ steps.meta.outputs.channel }}"
          marketing="${{ steps.meta.outputs.marketing }}"
          build_number="${{ github.run_number }}"

          mkdir -p gh-pages/appcast

          for arch in arm64 x86_64; do
            # Find the DMG for this arch
            dmg=$(find release-artifacts -name "*-macos-${arch}.dmg" -type f | head -1)
            if [[ -z "$dmg" ]]; then
              echo "::warning::No DMG found for $arch — skipping"
              continue
            fi

            # Sign the artifact and extract signature
            sig_output=$(./scripts/sparkle/sign-artifact.sh "$dmg")
            signature=$(echo "$sig_output" | sed -n 's/.*edSignature="\([^"]*\)".*/\1/p')
            if [[ -z "$signature" ]]; then
              echo "::error::Failed to extract Ed25519 signature for $arch"
              echo "sign_update output: $sig_output" >&2
              exit 1
            fi
            length=$(stat -f%z "$dmg")

            # GitHub Release download URL for this artifact
            dmg_name=$(basename "$dmg")
            download_url="https://github.com/${repo}/releases/download/${tag}/${dmg_name}"

            # Update the appcast for this channel+arch
            appcast_file="gh-pages/appcast/${channel}-macos-${arch}.xml"

            APPCAST_FILE="$appcast_file" \
            APPCAST_TITLE="con" \
            APPCAST_LINK="https://con-releases.nowledge.co" \
            ITEM_TITLE="Version ${marketing}" \
            ITEM_VERSION="$build_number" \
            ITEM_SHORT_VERSION="$marketing" \
            ITEM_URL="$download_url" \
            ITEM_LENGTH="$length" \
            ITEM_SIGNATURE="$signature" \
            ITEM_MIN_OS="10.15.7" \
            ./scripts/sparkle/update-appcast.sh

            echo "Updated appcast: ${channel}-macos-${arch}.xml (build $build_number)"
          done

      - name: Push appcast to gh-pages
        if: steps.sparkle.outputs.available == 'true'
        shell: bash
        run: |
          set -euo pipefail
          cd gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # Keep install.sh in sync from main repo
          cp "${{ github.workspace }}/scripts/install.sh" install.sh
          git add appcast/ install.sh
          if git diff --cached --quiet; then
            echo "No appcast changes to commit"
            exit 0
          fi
          git commit -m "Update appcast for $GITHUB_REF_NAME"
          # Pull-rebase to handle concurrent pushes gracefully
          git pull --rebase origin gh-pages 2>/dev/null || true
          git push origin gh-pages

  update-homebrew:
    name: Update Homebrew cask
    runs-on: macos-15
    needs: publish

    steps:
      - name: Derive release metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          channel="stable"
          if [[ "$version" == *"-beta."* ]]; then
            channel="beta"
          fi
          echo "version=$version" >>"$GITHUB_OUTPUT"
          echo "channel=$channel" >>"$GITHUB_OUTPUT"

      - name: Download release artifacts
        uses: actions/download-artifact@v5
        with:
          path: release-artifacts

      - name: Update cask formula
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          set -euo pipefail

          version="${{ steps.meta.outputs.version }}"
          channel="${{ steps.meta.outputs.channel }}"

          if [[ -z "${GH_TOKEN:-}" ]]; then
            echo "::warning::HOMEBREW_TAP_TOKEN not set — skipping cask update"
            exit 0
          fi

          # Determine cask name
          if [[ "$channel" == "beta" ]]; then
            cask="con-beta"
            app_name="con Beta"
          else
            cask="con"
            app_name="con"
          fi

          # Compute SHA256 for each arch DMG
          arm64_dmg=$(find release-artifacts -name "*-macos-arm64.dmg" -type f | head -1)
          x86_64_dmg=$(find release-artifacts -name "*-macos-x86_64.dmg" -type f | head -1)

          arm64_sha=""
          x86_64_sha=""
          [[ -n "$arm64_dmg" ]] && arm64_sha=$(shasum -a 256 "$arm64_dmg" | cut -d' ' -f1)
          [[ -n "$x86_64_dmg" ]] && x86_64_sha=$(shasum -a 256 "$x86_64_dmg" | cut -d' ' -f1)

          if [[ -z "$arm64_sha" && -z "$x86_64_sha" ]]; then
            echo "::warning::No DMGs found — skipping cask update"
            exit 0
          fi

          # Clone tap and update cask
          git clone "https://x-access-token:${GH_TOKEN}@github.com/nowledge-co/homebrew-tap.git" tap
          cd tap

          cat > "Casks/${cask}.rb" << RUBY
          cask "${cask}" do
            version "${version}"

            on_arm do
              sha256 "${arm64_sha}"
              url "https://github.com/nowledge-co/con/releases/download/v#{version}/${app_name// /-}-#{version}-macos-arm64.dmg"
            end

            on_intel do
              sha256 "${x86_64_sha}"
              url "https://github.com/nowledge-co/con/releases/download/v#{version}/${app_name// /-}-#{version}-macos-x86_64.dmg"
            end

            name "${app_name}"
            desc "GPU-accelerated terminal emulator with built-in AI agent"
            homepage "https://github.com/nowledge-co/con"

            livecheck do
              url "https://github.com/nowledge-co/con/releases?q=prerelease%3Atrue"
              regex(/v?(\d+(?:\.\d+)*-beta\.\d+)/i)
              strategy :page_match
            end

            auto_updates true
            depends_on macos: ">= :catalina"

            app "${app_name}.app"

            zap trash: [
              "~/.config/con",
              "~/Library/Caches/co.nowledge.con${channel == "beta" ? ".beta" : ""}",
              "~/Library/Preferences/co.nowledge.con${channel == "beta" ? ".beta" : ""}.plist",
            ]
          end
          RUBY

          # Remove leading whitespace from heredoc
          sed -i '' 's/^          //' "Casks/${cask}.rb"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "Casks/${cask}.rb"
          if git diff --cached --quiet; then
            echo "No cask changes"
            exit 0
          fi
          git commit -m "Update ${cask} to ${version}"
          git push origin main
