name: Release macOS

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15
            arch: arm64
            rust_target: aarch64-apple-darwin
          - runner: macos-15-intel
            arch: x86_64
            rust_target: x86_64-apple-darwin

    steps:
      - uses: actions/checkout@v4

      - name: Derive release metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          channel="stable"
          if [[ "$version" == *"-beta."* ]]; then
            channel="beta"
          fi
          echo "version=$version" >>"$GITHUB_OUTPUT"
          echo "channel=$channel" >>"$GITHUB_OUTPUT"

      - name: Install macOS dependencies
        shell: bash
        run: |
          set -euo pipefail
          brew update
          brew install zig cmake

      - name: Configure Rust toolchain
        shell: bash
        run: |
          set -euo pipefail
          rustup default stable
          rustup target add "${{ matrix.rust_target }}"

      - name: Import Developer ID certificate
        shell: bash
        env:
          APPLE_CERTIFICATE_P12_BASE64: ${{ secrets.APPLE_CERTIFICATE_P12_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_KEYCHAIN_PASSWORD: ${{ secrets.APPLE_KEYCHAIN_PASSWORD }}
        run: ./scripts/macos/import-certificate.sh

      - name: Build, sign, notarize, and package
        shell: bash
        env:
          CON_CHANNEL: ${{ steps.meta.outputs.channel }}
          CON_APP_VERSION: ${{ steps.meta.outputs.version }}
          CON_BUILD_NUMBER: ${{ github.run_number }}
          CON_ARCH: ${{ matrix.arch }}
          CON_RUST_TARGET: ${{ matrix.rust_target }}
          CON_REQUIRE_NOTARIZATION: "1"
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_NOTARY_KEY_ID: ${{ secrets.APPLE_NOTARY_KEY_ID }}
          APPLE_NOTARY_ISSUER_ID: ${{ secrets.APPLE_NOTARY_ISSUER_ID }}
          APPLE_NOTARY_API_KEY_BASE64: ${{ secrets.APPLE_NOTARY_API_KEY_BASE64 }}
        run: ./scripts/macos/release.sh

      - name: Upload notarized artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-${{ matrix.arch }}
          path: dist/macos/${{ steps.meta.outputs.channel }}/${{ matrix.arch }}/*
          if-no-files-found: error

  publish:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Derive release metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          prerelease="false"
          if [[ "$version" == *"-beta."* ]]; then
            prerelease="true"
          fi
          echo "version=$version" >>"$GITHUB_OUTPUT"
          echo "prerelease=$prerelease" >>"$GITHUB_OUTPUT"

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          tag="$GITHUB_REF_NAME"
          prerelease_flag=()
          if [[ "${{ steps.meta.outputs.prerelease }}" == "true" ]]; then
            prerelease_flag+=(--prerelease)
          fi

          if ! gh release view "$tag" >/dev/null 2>&1; then
            gh release create "$tag" --title "$tag" --generate-notes "${prerelease_flag[@]}"
          fi

          find release-artifacts -type f -print0 | xargs -0 gh release upload "$tag" --clobber
