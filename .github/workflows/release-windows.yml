name: Release Windows

# v0 release pipeline for the Windows port. Unsigned for now — the
# user downloads a ZIP, unpacks it anywhere, and runs `con-app.exe`.
# No installer, no code signature, no auto-update. Those come later.
#
# macOS releases live in release-macos.yml and run on the same `v*`
# tag; this workflow piggybacks onto the same release the macOS job
# creates so a single `git tag v0.X.Y && git push --tags` ships both
# platforms.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build windows-x86_64
    runs-on: windows-2022

    # Two workarounds converge here:
    #
    # 1. CON_CHECKOUT_DIR sidesteps the CON reserved-name trap: runner
    #    2.333.1+ rejects any workspace path whose components match a
    #    DOS device name. Cloning to C:\src\repo keeps us out of that
    #    namespace — same workaround ci-portable.yml uses.
    #
    # 2. ZIG_GLOBAL_CACHE_DIR shortens the uucode package cache path so
    #    Zig's build system can spawn uucode_build_tables.exe. The
    #    default cache lives at %LOCALAPPDATA%\zig (~60 chars deep),
    #    and Zig invokes the exe via a relative path walking back up
    #    to the project's .zig-cache — combined length lands just over
    #    MAX_PATH (260) and CreateProcessW returns FILE_NOT_FOUND. A
    #    short cache root (C:\zc) keeps the composed path comfortably
    #    under the legacy limit.
    env:
      CON_CHECKOUT_DIR: C:\src\repo
      ZIG_GLOBAL_CACHE_DIR: C:\zc

    defaults:
      run:
        working-directory: C:\src\repo

    steps:
      - name: Clone repo outside the reserved-name path
        working-directory: C:\
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          New-Item -ItemType Directory -Force -Path $env:CON_CHECKOUT_DIR | Out-Null
          git -c core.longpaths=true clone `
            "https://x-access-token:$env:GH_TOKEN@github.com/${{ github.repository }}.git" `
            $env:CON_CHECKOUT_DIR
          Set-Location $env:CON_CHECKOUT_DIR
          git fetch origin "${{ github.ref }}"
          git checkout "${{ github.ref_name }}"
          git log -1 --oneline

      - name: Derive release metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          echo "version=$version" >>"$GITHUB_OUTPUT"

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: C:\src\repo

      - name: Prepare short-path Zig cache
        working-directory: C:\
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path $env:ZIG_GLOBAL_CACHE_DIR | Out-Null

      - name: Defense-in-depth — exclude build dirs from Defender
        # Defender real-time scanning can briefly lock a just-written
        # PE file. Not the dominant failure mode (path-length was) but
        # cheap to rule out.
        shell: pwsh
        run: |
          Set-MpPreference -DisableRealtimeMonitoring $true -ErrorAction SilentlyContinue
          Add-MpPreference -ExclusionPath $env:CON_CHECKOUT_DIR -ErrorAction SilentlyContinue
          Add-MpPreference -ExclusionPath $env:TEMP -ErrorAction SilentlyContinue
          Add-MpPreference -ExclusionPath "$env:USERPROFILE\.local" -ErrorAction SilentlyContinue
          Add-MpPreference -ExclusionPath $env:ZIG_GLOBAL_CACHE_DIR -ErrorAction SilentlyContinue

      - name: Install Zig 0.15.2
        shell: pwsh
        run: |
          $ZigVersion = "0.15.2"
          $ZigDir    = "zig-x86_64-windows-$ZigVersion"
          $ZigZip    = "$ZigDir.zip"
          $Url       = "https://ziglang.org/download/$ZigVersion/$ZigZip"
          $Dest      = "$env:USERPROFILE\.local"
          New-Item -ItemType Directory -Force -Path $Dest | Out-Null
          Invoke-WebRequest -Uri $Url -OutFile "$env:TEMP\$ZigZip"
          Expand-Archive -Path "$env:TEMP\$ZigZip" -DestinationPath $Dest -Force
          Add-Content -Path $env:GITHUB_PATH -Value "$Dest\$ZigDir"
          & "$Dest\$ZigDir\zig.exe" version

      - name: Build release binary
        id: build
        shell: pwsh
        # `cargo wbuild` is the workspace alias for
        # `cargo build --no-default-features --features con/bin-con-app`
        # — required because CON is a reserved DOS name and plain
        # `con.exe` cannot be created.
        run: |
          cargo wbuild -p con --release

      - name: Diagnose build failure
        if: failure() && steps.build.conclusion == 'failure'
        shell: pwsh
        # Zig reports `FileNotFound` for any CreateProcess failure,
        # including `STATUS_DLL_NOT_FOUND` and other loader errors. That
        # message is useless on its own. This step re-runs the failed
        # build-tool exes directly through `cmd /c` and `Start-Process`
        # so Windows surfaces the real NTSTATUS, and dumps enough
        # environmental context (Defender, VS install, PATH, exe stream
        # metadata) to narrow down whether this is AV, a missing DLL,
        # or something else — without burning another CI cycle.
        run: |
          $ErrorActionPreference = 'Continue'

          Write-Host "::group::Failed exe discovery"
          $exes = Get-ChildItem -Recurse -ErrorAction SilentlyContinue `
            -Path "C:\src\repo\target" -Filter "uucode_build_tables.exe"
          foreach ($exe in $exes) {
            Write-Host "---"
            Write-Host "Path: $($exe.FullName)"
            Write-Host "Size: $($exe.Length) bytes"
            Write-Host "LastWrite: $($exe.LastWriteTime)"
            $streams = Get-Item -Path $exe.FullName -Stream * -ErrorAction SilentlyContinue
            if ($streams) {
              Write-Host "ADS streams:"
              $streams | Format-Table Stream, Length -AutoSize | Out-String | Write-Host
            }
          }
          Write-Host "::endgroup::"

          if ($exes.Count -gt 0) {
            $exe = $exes[0].FullName
            Write-Host "::group::cmd /c spawn — real Windows error"
            cmd /c "`"$exe`" 2>&1"
            Write-Host "(exit $LASTEXITCODE)"
            Write-Host "::endgroup::"

            Write-Host "::group::Start-Process — structured failure info"
            try {
              $p = Start-Process -FilePath $exe -PassThru -Wait -NoNewWindow `
                -RedirectStandardOutput "$env:TEMP\ucc-out.txt" `
                -RedirectStandardError  "$env:TEMP\ucc-err.txt"
              Write-Host "Exit code: $($p.ExitCode)"
              Get-Content "$env:TEMP\ucc-out.txt" -ErrorAction SilentlyContinue | Write-Host
              Get-Content "$env:TEMP\ucc-err.txt" -ErrorAction SilentlyContinue | Write-Host
            } catch {
              Write-Host "EXCEPTION: $($_.Exception.GetType().FullName)"
              Write-Host "Message:  $($_.Exception.Message)"
              Write-Host "HResult:  0x$('{0:X8}' -f $_.Exception.HResult)"
              if ($_.Exception.InnerException) {
                Write-Host "Inner:    $($_.Exception.InnerException.Message)"
              }
            }
            Write-Host "::endgroup::"
          } else {
            Write-Host "::warning::uucode_build_tables.exe not found under target\ — can't probe"
          }

          Write-Host "::group::Defender state"
          try {
            Get-MpPreference | Select-Object `
              DisableRealtimeMonitoring, `
              ExclusionPath, `
              ExclusionExtension, `
              MAPSReporting | Format-List | Out-String | Write-Host
            Get-MpComputerStatus | Select-Object `
              RealTimeProtectionEnabled, `
              AMServiceEnabled, `
              IsTamperProtected | Format-List | Out-String | Write-Host
          } catch { Write-Host "Defender cmdlet unavailable: $($_.Exception.Message)" }
          Write-Host "::endgroup::"

          Write-Host "::group::VS / MSVC detection"
          $vswhere = "C:\Program Files (x86)\Microsoft Visual Studio\Installer\vswhere.exe"
          if (Test-Path $vswhere) {
            & $vswhere -latest -format value -property installationPath
            & $vswhere -latest -format value -property installationVersion
          } else {
            Write-Host "vswhere.exe not found"
          }
          Write-Host "---"
          Write-Host "System32 MSVC runtime presence:"
          Get-Item "$env:WINDIR\System32\vcruntime140*.dll" -ErrorAction SilentlyContinue |
            Select-Object Name, Length | Format-Table -AutoSize | Out-String | Write-Host
          Get-Item "$env:WINDIR\System32\msvcp140*.dll" -ErrorAction SilentlyContinue |
            Select-Object Name, Length | Format-Table -AutoSize | Out-String | Write-Host
          Get-Item "$env:WINDIR\System32\ucrtbase.dll" -ErrorAction SilentlyContinue |
            Select-Object Name, Length | Format-Table -AutoSize | Out-String | Write-Host
          Write-Host "::endgroup::"

          Write-Host "::group::OS image"
          (Get-CimInstance Win32_OperatingSystem | Select-Object Caption, Version, BuildNumber | Format-List | Out-String).Trim() | Write-Host
          Write-Host "::endgroup::"

          Write-Host "::group::PATH"
          $env:PATH -split ';' | ForEach-Object { Write-Host "  $_" }
          Write-Host "::endgroup::"

      - name: Package ZIP
        id: package
        shell: pwsh
        run: |
          $Version = "${{ steps.meta.outputs.version }}"
          $StagingDir = "dist\con-$Version-windows-x86_64"
          New-Item -ItemType Directory -Force -Path $StagingDir | Out-Null
          Copy-Item "target\release\con-app.exe" "$StagingDir\con-app.exe"
          if (Test-Path "README.md")  { Copy-Item "README.md"  $StagingDir }
          if (Test-Path "LICENSE")    { Copy-Item "LICENSE"    $StagingDir }
          if (Test-Path "LICENSE.md") { Copy-Item "LICENSE.md" $StagingDir }
          $Zip = "dist\con-$Version-windows-x86_64.zip"
          Compress-Archive -Path "$StagingDir\*" -DestinationPath $Zip -Force
          $Sha = (Get-FileHash -Algorithm SHA256 $Zip).Hash.ToLower()
          "$Sha  $(Split-Path -Leaf $Zip)" | Out-File "dist\SHA256SUMS-windows.txt" -Encoding ascii
          "zip=$Zip"                          | Out-File $env:GITHUB_OUTPUT -Append
          "sha256=dist\SHA256SUMS-windows.txt" | Out-File $env:GITHUB_OUTPUT -Append

      - name: Upload artifacts
        uses: actions/upload-artifact@v5
        with:
          name: windows-x86_64
          path: |
            C:\src\repo\dist\con-*-windows-x86_64.zip
            C:\src\repo\dist\SHA256SUMS-windows.txt
          if-no-files-found: error

  publish:
    name: Attach to GitHub release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/download-artifact@v5
        with:
          name: windows-x86_64
          path: release-artifacts

      - name: Create or update release & upload
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        shell: bash
        run: |
          set -euo pipefail
          tag="$GITHUB_REF_NAME"

          # The macOS job may have already created the release. If not,
          # create it now so a Windows-only tag still publishes.
          if ! gh release view "$tag" >/dev/null 2>&1; then
            gh release create "$tag" --title "$tag" --generate-notes
          fi

          while IFS= read -r -d '' file; do
            echo "Uploading: $file"
            gh release upload "$tag" "$file" --clobber
          done < <(find release-artifacts -type f \
            \( -name '*.zip' -o -name 'SHA256SUMS-windows.txt' \) \
            -print0)

  update-appcast:
    name: Update Sparkle appcast (windows-x86_64)
    # Run on macOS because Sparkle's `sign_update` tool ships only in
    # the macOS Sparkle distribution. The signing key is the same
    # Ed25519 keypair used for macOS artifacts — the Windows client
    # verifies it server-side via GitHub Pages publishing; in-app
    # signature verification comes in a follow-up PR.
    runs-on: macos-15
    needs: build

    steps:
      - uses: actions/checkout@v5

      - name: Derive release metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          channel="stable"
          if [[ "$version" == *"-beta."* ]]; then
            channel="beta"
          fi
          marketing="${version%%[-+]*}"
          echo "version=$version"     >>"$GITHUB_OUTPUT"
          echo "channel=$channel"     >>"$GITHUB_OUTPUT"
          echo "marketing=$marketing" >>"$GITHUB_OUTPUT"

      - name: Check Sparkle signing key
        id: sparkle
        shell: bash
        env:
          SPARKLE_SIGNING_KEY: ${{ secrets.SPARKLE_SIGNING_KEY }}
        run: |
          if [[ -z "${SPARKLE_SIGNING_KEY:-}" ]]; then
            echo "available=false" >>"$GITHUB_OUTPUT"
            echo "::warning::SPARKLE_SIGNING_KEY not set — skipping appcast update"
          else
            echo "available=true" >>"$GITHUB_OUTPUT"
          fi

      - name: Download Sparkle tools
        if: steps.sparkle.outputs.available == 'true'
        shell: bash
        run: ./scripts/sparkle/download.sh

      - name: Download Windows release artifact
        if: steps.sparkle.outputs.available == 'true'
        uses: actions/download-artifact@v5
        with:
          name: windows-x86_64
          path: release-artifacts

      - name: Checkout gh-pages
        if: steps.sparkle.outputs.available == 'true'
        shell: bash
        run: |
          set -euo pipefail
          git clone --single-branch --branch gh-pages \
            "https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git" \
            gh-pages 2>/dev/null || {
            mkdir -p gh-pages/appcast
            cd gh-pages
            git init
            git checkout -b gh-pages
            git remote add origin \
              "https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git"
            echo "con-releases.nowledge.co" > CNAME
            touch .nojekyll
            git add CNAME .nojekyll
            git commit -m "Initialize gh-pages"
          }

      - name: Sign ZIP and update Windows appcast
        if: steps.sparkle.outputs.available == 'true'
        shell: bash
        env:
          SPARKLE_SIGNING_KEY: ${{ secrets.SPARKLE_SIGNING_KEY }}
          SPARKLE_DIR: ${{ github.workspace }}/.sparkle
        run: |
          set -euo pipefail

          repo="${{ github.repository }}"
          tag="$GITHUB_REF_NAME"
          version="${{ steps.meta.outputs.version }}"
          channel="${{ steps.meta.outputs.channel }}"
          marketing="${{ steps.meta.outputs.marketing }}"
          build_number="${{ github.run_number }}"

          mkdir -p gh-pages/appcast

          zip=$(find release-artifacts -name "*-windows-x86_64.zip" -type f | head -1)
          if [[ -z "$zip" ]]; then
            echo "::warning::No Windows ZIP found — skipping"
            exit 0
          fi

          sig_output=$(./scripts/sparkle/sign-artifact.sh "$zip")
          signature=$(echo "$sig_output" | sed -n 's/.*edSignature="\([^"]*\)".*/\1/p')
          if [[ -z "$signature" ]]; then
            echo "::error::Failed to extract Ed25519 signature"
            echo "sign_update output: $sig_output" >&2
            exit 1
          fi
          length=$(stat -f%z "$zip")
          zip_name=$(basename "$zip")
          download_url="https://github.com/${repo}/releases/download/${tag}/${zip_name}"

          appcast_file="gh-pages/appcast/${channel}-windows-x86_64.xml"

          # Re-use the same appcast generator the macOS pipeline uses.
          # Windows has no OS minimum so we feed a harmless sentinel;
          # the Windows client ignores the field.
          APPCAST_FILE="$appcast_file" \
          APPCAST_TITLE="con" \
          APPCAST_LINK="https://con-releases.nowledge.co" \
          ITEM_TITLE="Version ${marketing}" \
          ITEM_VERSION="$build_number" \
          ITEM_SHORT_VERSION="$marketing" \
          ITEM_URL="$download_url" \
          ITEM_LENGTH="$length" \
          ITEM_SIGNATURE="$signature" \
          ITEM_MIN_OS="10.0.0" \
          ./scripts/sparkle/update-appcast.sh

          echo "Updated appcast: ${channel}-windows-x86_64.xml (build $build_number)"

      - name: Push appcast to gh-pages
        if: steps.sparkle.outputs.available == 'true'
        shell: bash
        run: |
          set -euo pipefail
          cd gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add appcast/
          if git diff --cached --quiet; then
            echo "No appcast changes to commit"
            exit 0
          fi
          git commit -m "Update Windows appcast for $GITHUB_REF_NAME"
          git pull --rebase origin gh-pages 2>/dev/null || true
          git push origin gh-pages
